name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test And Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 20
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Install
        run: yarn install --immutable

      - name: Test
        run: yarn test

      - name: Build
        run: yarn build

      - name: Build Docs
        run: yarn docs:build

  image:
    name: Build Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Set Up Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Build Image
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          push: false
          tags: rtc-session-gateway:main
          build-args: |
            BUILD_VERSION=0.0.0-main
