name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test And Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Install
        run: yarn install --immutable

      - name: Test
        run: yarn test

      - name: Build
        run: yarn build

      - name: Build Docs
        run: yarn docs:build

  image:
    name: Build And Publish Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Set Up Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Log In To GHCR
        uses: docker/login-action@v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build And Publish Image
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          push: true
          tags: ghcr.io/zyno-io/rtc-session-gateway:main
          labels: |
            org.opencontainers.image.source=https://github.com/zyno-io/rtc-session-gateway
            org.opencontainers.image.revision=${{ github.sha }}
          build-args: |
            BUILD_VERSION=0.0.0-main
